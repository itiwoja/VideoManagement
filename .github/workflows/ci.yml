name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-vault/backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: video-vault/backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video-vault/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: video-vault/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
