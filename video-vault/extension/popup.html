<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Video Vault</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px 14px 12px;
        background: #18181b;
        color: #f4f4f5;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 10px;
        letter-spacing: 0.02em;
      }
      .url {
        font-size: 11px;
        color: #a1a1aa;
        word-break: break-all;
        line-height: 1.4;
        margin-bottom: 12px;
        max-height: 4.2em;
        overflow: hidden;
      }
      button {
        width: 100%;
        font-size: 13px;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        margin-bottom: 6px;
        font-family: inherit;
      }
      .primary {
        background: #f4f4f5;
        color: #18181b;
      }
      .primary:hover {
        background: #e4e4e7;
      }
      .ghost {
        background: transparent;
        color: #a1a1aa;
        font-size: 11px;
        padding: 4px;
      }
      .ghost:hover {
        color: #f4f4f5;
      }
      .status {
        font-size: 11px;
        color: #a1a1aa;
        margin-top: 6px;
        min-height: 1.4em;
      }
      .status.ok {
        color: #34d399;
      }
      .status.error {
        color: #f87171;
      }
      .footer {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #27272a;
        font-size: 11px;
        text-align: right;
      }
      .footer a {
        color: #a1a1aa;
        text-decoration: none;
      }
      .footer a:hover {
        color: #f4f4f5;
      }
    </style>
  </head>
  <body>
    <h1>Video Vault</h1>
    <div class="url" id="current-url">…</div>
    <button class="primary" id="save-btn">このページを保存</button>
    <button class="ghost" id="open-vault">Vault を開く</button>
    <div class="status" id="status"></div>
    <div class="footer">
      <a href="#" id="open-options">設定</a>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
