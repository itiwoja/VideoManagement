<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Video Vault</title>
    <script>
      // 初期テーマを React 描画前に同期適用し、ちらつき(FOUC)を防ぐ。
      (function () {
        try {
          var stored = localStorage.getItem('vv-theme');
          var dark =
            stored === 'dark' ||
            ((stored === 'system' || !stored) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#18181b' : '#fafafa');
        } catch (e) {
          // localStorage 不可な環境は無視 (デフォルトのライトテーマのまま)
        }
      })();
    </script>
  </head>
  <body class="bg-zinc-50 dark:bg-zinc-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 軽量 service worker 登録 (PWA インストール条件を満たすため)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
